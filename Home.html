<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

   

    <!-- Tailwind+daysi  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts  -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    *{
        font-family: "Geist", sans-serif;
    }
  </style>



</head>
<body class="bg-[#F8FAFC] px-4 py-8 md:pl-[245px] md:pr-[245px] md:pt-[60px] md:pb-[60px]">

<header class="mb-5">
        <h1 class="font-bold text-2xl md:text-3xl text-[#002C5C] mb-5 text-center md:text-left">Job Application Tracker</h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="card card-border bg-base-100 w-96 p-3">
  <div class="">
    <p class="font-normal text-sm">Total</p>
    <p class="font-semibold text-2xl">8</p>
  </div>
</div>

<div class="card card-border bg-base-100 w-96 p-3">
  <div class="">
    <p class="font-normal text-sm">Interview</p>
    <p class="font-semibold text-2xl text-green-500">0</p> 
  </div>
</div>

<div class="card card-border bg-base-100 w-96 p-3">
  <div class="">
    <p class="font-normal text-sm">Rejected</p>
    <p class="font-semibold text-2xl text-red-600">0</p>
  </div>
</div>
    </div>

    </header>

    <div class="text-[#E6E7E9]"><hr></div>
    <main>
        <div>
            <div class="flex justify-between items-center">
            <h2 class="text-xl font-bold text-[#002C5C] mb-5">Available Jobs</h2>
            <span  class="text-base text-[#64748B]">0 jobs</span>
        </div>
            <div class="mb-5">
                <button class="btn btn-soft btn-primary w-[100px] text-[#64748B]">All</button>
                <button class="btn btn-soft btn-primary text-[#64748B]">Interview</button>
                <button class="btn btn-soft btn-primary text-[#64748B]">Rejected</button>
            </div>
        </div>

        <section class="p-2 rounded-md">
    <div class="card bg-base-100 p-20 shadow-sm">
  <figure class="mb-4">
    <img
      src="./jobs.png"
      alt=""
      class="rounded-xl" />
  </figure>
  <div class="items-center text-center space-y-1">
    <h2 class="text-[#002C5C] font-bold text-xl">No jobs available</h2>
    <p class="text-[#64748B]">Check back soon for new job opportunities</p>
  </div>
</div>
   </section>

</main>






   
</body>
</html>
